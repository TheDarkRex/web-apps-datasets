{% extends 'datasets/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm">
            <div class="card-body p-4">
              <h2 class="h4 mb-4">
                  {% if object %}Edytuj bazę: {{ object.name }}{% else %}Dodaj nową bazę danych{% endif %}
              </h2>
                
                <form method="post">
                    {% csrf_token %}
                    
                    {% for field in form %}
                        <div class="mb-3">
                            <label for="{{ field.id_for_label }}" class="form-label fw-bold text-muted small">
                                {{ field.label }}
                            </label>
                            
                            {{ field }}
                            
                            {% if field.errors %}
                                <div class="text-danger small mt-1">{{ field.errors }}</div>
                            {% endif %}
                        </div>
                    {% endfor %}
                    
                    <div class="d-flex justify-content-between mt-4">
                      <a href="{% if object %}{% url 'datasets:detail' object.pk %}{% else %}{% url 'datasets:list' %}{% endif %}" class="btn btn-outline-secondary">Anuluj</a>
                      <button type="submit" class="btn btn-success">
                          {% if object %}Zapisz zmiany{% else %}Zapisz bazę{% endif %}
                      </button>
                  </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

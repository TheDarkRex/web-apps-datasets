<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repozytorium Baz Danych</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-4">
    <header class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
        <div>
            <h1 class="h3 mb-1">Repozytorium Baz Danych</h1>
            <p class="text-muted mb-0">Platforma wymiany zbiorów danych</p>
        </div>
        <nav class="d-flex align-items-center">
            <a href="{% url 'datasets:list' %}" class="btn btn-outline-primary me-3">Lista baz</a>

            {% if user.is_authenticated %}
                <span class="text-muted me-3">Zalogowany jako: <strong>{{ user.username }}</strong></span>
                <a href="{% url 'datasets:create' %}" class="btn btn-success me-2">Dodaj bazę</a>

                <form method="post" action="{% url 'logout' %}" class="m-0 p-0">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-outline-danger">Wyloguj</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}" class="btn btn-primary">Zaloguj się</a>
            {% endif %}
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>
</div>

</body>
</html>

{% extends 'datasets/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-danger">
            <div class="card-body p-4 text-center">
                <h2 class="h4 mb-3 text-danger">Potwierdź usunięcie</h2>
                <p>Czy na pewno chcesz usunąć bazę danych <strong>"{{ object.name }}"</strong>?</p>
                <p class="text-muted small">Ta operacja jest nieodwracalna, a wszystkie powiązane z nią zapytania oraz schematy zostaną skasowane.</p>
                
                <form method="post" class="mt-4">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-3">
                        <a href="{% url 'datasets:detail' object.pk %}" class="btn btn-outline-secondary">Anuluj</a>
                        <button type="submit" class="btn btn-danger">Tak, usuń trwale</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% extends 'datasets/base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm">
            <div class="card-body p-4 text-center">
                <h2 class="h4 mb-3">Resetowanie hasła</h2>
                <p class="text-muted small mb-4">Podaj adres e-mail przypisany do Twojego konta. Prześlemy Ci instrukcję resetowania hasła.</p>
                
                <form method="post" class="text-start">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-primary w-100">Wyślij link</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

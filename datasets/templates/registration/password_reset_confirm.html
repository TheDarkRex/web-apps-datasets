{% extends 'datasets/base.html' %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card shadow-sm p-4">
            <h2 class="h4 mb-3">Ustaw nowe hasło</h2>
            {% if validlink %}
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-success w-100">Zapisz nowe hasło</button>
                </form>
            {% else %}
                <div class="alert alert-danger">Link do resetu hasła jest nieprawidłowy lub wygasł.</div>
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}

{% extends 'datasets/base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h2 class="h4 text-center mb-4">Rejestracja konta</h2>
                
                <form method="post">
                    {% csrf_token %}
                    
                    {% for field in form %}
                        <div class="mb-3">
                            <label for="{{ field.id_for_label }}" class="form-label text-muted small fw-bold">
                                {{ field.label }}
                            </label>
                            
                            {{ field }}
                            
                            {% if field.help_text %}
                                <div class="form-text small">{{ field.help_text }}</div>
                            {% endif %}
                            
                            {% if field.errors %}
                                <div class="text-danger small mt-1">{{ field.errors }}</div>
                            {% endif %}
                        </div>
                    {% endfor %}
                    
                    <button type="submit" class="btn btn-success w-100 mt-3">Utwórz konto</button>
                </form>
                
                <div class="text-center mt-3 small">
                    Masz już konto? <a href="{% url 'login' %}">Zaloguj się</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
